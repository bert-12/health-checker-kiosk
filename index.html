<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Self-Check Kiosk</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Health Self-Check Kiosk</h1>
        <p>Calculate your Body Mass Index (BMI) and receive a wellness recommendation.</p>
    </header>

    <main>
        <section class="card">
            <form id="bmiForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" min="1" max="120" placeholder="Enter your age" required>
                </div>

                <div class="form-group">
                    <label for="sex">Sex</label>
                    <select id="sex" required>
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" id="weight" min="1" step="0.1" placeholder="Enter your weight" required>
                </div>

                <div class="form-group">
                    <label for="height">Height (cm)</label>
                    <input type="number" id="height" min="1" step="0.1" placeholder="Enter your height" required>
                </div>

                <div class="button-row">
                    <button type="submit" class="btn-submit">Check My BMI</button>
                    <button type="button" class="btn-reset" id="resetBtn">Reset</button>
                </div>
            </form>
        </section>

        <section id="resultCard" class="hidden">
            <h2>BMI Result</h2>
            <h3 id="resultName"></h3>
            <p><strong>BMI:</strong> <span id="resultBMI"></span></p>
            <p><strong>Category:</strong> <span id="resultCategory"></span></p>
            <p id="resultMessage"></p>
        </section>
    </main>

    <footer>
        <p>Health Self-Check Kiosk</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
